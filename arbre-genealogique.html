    :root {
      --cream:     #FEFBF6;
      --rose:      #D4899A;
      --rose-deep: #B06070;
      --bleu:      #6A8FA0;
      --bleu-pale: #C8DCE6;
      --or:        #C0A050;
      --noir:      #1C1C1C;
      --gris:      #6A6A6A;
      --serif:     'Cormorant Garamond', Georgia, serif;
      --sans:      'Jost', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

      background: var(--cream);
      color: var(--noir);
      padding: 0;

    }

    .header {
      text-align: center;
      padding: 1.5rem 2rem 1rem;
      position: relative;
      margin-bottom: 0;
    }
    .header h1 { font-family: var(--serif); font-size: 2.2rem; font-weight: 300; }
    .header h1 em { color: var(--rose-deep); font-style: italic; }
    .header p { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gris); margin-top: 0.4rem; }

    .back-btn {
      position: absolute;
      top: 50%; left: 1.5rem;
      transform: translateY(-50%);
      font-size: .72rem; letter-spacing: .08em; text-transform: uppercase;
      color: #3a2010; text-decoration: none;
      border: 1px solid #b09080;
      border-radius: 20px;
      padding: .35rem .85rem;
      display: flex; align-items: center; gap: .4rem;
      transition: border-color .18s, color .18s;
      white-space: nowrap;
    }
    .back-btn:hover { border-color: var(--rose-deep); color: var(--rose-deep); }
    @media (max-width: 600px) {
      .header { padding: 1.2rem 1.5rem 1rem; }
      .back-btn {
        position: static;
        transform: none;
        margin: 0 auto .9rem;
        width: fit-content;
      }
    }

    .tree-outer {
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      height: 68vh;
      position: relative;
      user-select: none;
    }
    .tree-outer.panning { cursor: grabbing; }

    /* SVG styles */
    .tree-svg { display: block; width: 100%; height: 100%; }

    .zoom-controls {
      position: absolute; bottom: .75rem; right: .75rem;
      display: flex; flex-direction: column; gap: .35rem; z-index: 5;
    }
    .zoom-btn {
      width: 34px; height: 34px;
      background: rgba(255,255,255,.88); backdrop-filter: blur(4px);
      border: 1px solid rgba(0,0,0,.1); border-radius: 50%; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.1); transition: background .15s;
      color: var(--noir); line-height: 1;
    }
    .zoom-btn:hover { background: white; }

    .mobile-hint {
      display: none;
      position: absolute; top: .5rem; left: 50%; transform: translateX(-50%);
      font-size: .58rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--gris); background: rgba(255,255,255,.82);
      padding: .25rem .8rem; border-radius: 20px;
      pointer-events: none; white-space: nowrap; z-index: 5;
    }

    @media (max-width: 900px) {
      .mobile-hint { display: block; }
      .header { padding: 1.2rem 1rem 0.8rem; }
      .back-btn { font-size: .62rem; }
      .info-panel { flex-direction: column; gap: .5rem; min-height: auto; padding: .8rem 1.2rem; }
      .info-panel-name { min-width: unset; }
      .info-panel-cta { margin-left: 0; }
      .legend { gap: 1rem; }
    }
    @media (max-width: 600px) {
      .header h1 { font-size: 1.6rem; }
      .header p { display: none; }
      .tree-outer { height: 60vh; }
      .back-btn { font-size: .6rem; left: .75rem; }
    }

    /* Paths */
    .rel-path {
      fill: none;
      stroke-width: 1.8;
      opacity: 0;
      transition: opacity 0.28s ease;
      pointer-events: none;
    }
    .rel-path.on { opacity: 0.7; }

    /* Nodes */
    .node-circle {
      cursor: pointer;
      transition: r 0.18s ease;
    }
    .node-circle:hover { r: 16; }
    .node-group:hover .node-circle { r: 16; }

    .node-label {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
      user-select: none;
    }
    .node-sub-label {
      font-family: var(--sans);
      font-size: 9.5px;
      font-weight: 300;
      letter-spacing: 0.06em;
      pointer-events: none;
      user-select: none;
    }
    .elite-star {
      font-size: 9px;
      fill: var(--or);
      pointer-events: none;
    }

    .info-panel {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      margin: 1.5rem auto 0;
      max-width: 1680px;
      min-height: 90px;
      padding: 1.1rem 2rem;
      border-top: 1px solid rgba(176,96,112,0.15);
      border-bottom: 1px solid rgba(176,96,112,0.15);
      transition: background 0.22s ease;
    }
    .info-panel.active {
      background: rgba(255,255,255,0.7);
    }
    .info-panel-name {
      min-width: 200px;
      flex-shrink: 0;
    }
    .info-panel-name h2 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 400;
      line-height: 1.2;
      color: var(--noir);

    .info-panel-name .sub {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gris);
      margin-top: 3px;
    }
    .info-panel-fields {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 2rem;
      font-size: 0.78rem;
    }
    .info-panel-fields .field { color: var(--gris); }
    .info-panel-fields .field strong { color: var(--noir); font-weight: 500; }
    .info-panel-info {
      font-size: 0.78rem;
      font-style: italic;
      color: var(--gris);
      flex-basis: 100%;
      margin-top: 0.1rem;
    }
    .robe-pill {
      display: inline-flex;
      align-items: center;
      background: rgba(212,137,154,0.10);
      border: 1px solid rgba(176,96,112,0.22);
      color: var(--rose-deep);
      border-radius: 20px;
      padding: .18rem .65rem;
      font-size: .67rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      align-self: flex-start;
    }
    .info-panel-empty {
      width: 100%;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(106,106,106,0.4);
    }
    .info-panel-cta {
      flex-shrink: 0;
      margin-left: auto;
    }
    .info-panel-cta a {
      display: inline-block;
      padding: 0.45rem 1.1rem;
      border: 1px solid var(--rose);
      border-radius: 30px;
      color: var(--rose-deep);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.18s, color 0.18s;
    }
    .info-panel-cta a:hover {
      background: var(--rose);
      color: white;
    }

    .gen-label {
      position: absolute;
      left: 10px;
      pointer-events: none;
      z-index: 5;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .gen-label.visible { opacity: 1; }
    .gen-label-text {
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gris);
      white-space: nowrap;
      background: rgba(254,251,246,0.88);
      padding: 2px 7px;
      border-radius: 4px;
      border-left: 2px solid rgba(176,96,112,0.25);

    #lb-photo-ov {
      display: none; position: fixed; inset: 0;

    #lb-photo-ov img {

      position: absolute; top: 1rem; right: 1.5rem;

    .legend {

    .leg-line { width: 30px; height: 2px; border-radius: 2px; flex-shrink: 0; }
    .leg-cross { width: 14px; height: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #9A8A84; font-family: Georgia, serif; opacity: .8; }

// ── ÉTAT PARTAGÉ : calcul des nœuds à révéler pour un cheval donné
function computeReveal(hid) {
  const ids = new Set();
  const pairs = new Set();
  RELS.forEach(r => {
    if(r.p1 === hid || r.p2 === hid || r.c === hid) {
      if(r.p1) { pairs.add(r.p1 + ',' + r.c); ids.add(r.p1); }
      if(r.p2) { pairs.add(r.p2 + ',' + r.c); ids.add(r.p2); }
      ids.add(r.c);
    }
  });
  return { ids, pairs };
}

// Applique l'état courant (activeRevealIds / activeVisiblePairs) au SVG
function applyState() {
  // Chemins
  document.querySelectorAll('.rel-path').forEach(path => {
    const key = path.getAttribute('data-nodes') || '';
    path.style.opacity = activeVisiblePairs.has(key) ? '0.75' : '0';
  });

  // Nœuds
  DATA.forEach(d => {
    if(!nodeGroups[d.id]) return;
    const revealed = activeRevealIds.has(d.id);

    // Opacité nœuds externes / hors-élevage / mémoire
    if(d.ext || d.hidden) {
      nodeGroups[d.id].style.opacity = revealed ? '1' : '0.15';
    } else if(d.memorial) {
      nodeGroups[d.id].style.opacity = revealed ? '1' : '0.5';
    }

    // Taille du cercle
    const isSelected = activeNode && d.id === activeNode.id;
    if(circleEls[d.id]) {
      circleEls[d.id].setAttribute('r', isSelected ? R_SELECTED : (revealed ? R_ACTIVE : R));
    }

    // Photo
    if(photoEls[d.id]) {
      photoEls[d.id].setAttribute('opacity', revealed ? '1' : '0');
    }

    // Étoile élite — suit le cercle
    if(starEls[d.id]) {
      const p = POS[d.id];
      const rNow = isSelected ? R_SELECTED : (revealed ? R_ACTIVE : R);
      starEls[d.id].setAttribute('y', revealed ? p.y - rNow - 6 : p.y - R - 8);
    }
  });
}

// ── PAN / ZOOM ────────────────────────────────────────────────────────────
const treeOuter = document.getElementById('treeOuter');
const TREE_W = 1900, TREE_H = 1100; // inclut rang 0 (y=-110) → rang mémoire (y=820)
const MIN_S = 0.12, MAX_S = 3;

function fitTransform() {
  const cw = treeOuter.clientWidth, ch = treeOuter.clientHeight;
  const s = Math.min(cw / TREE_W, ch / TREE_H) * 0.93;
  // Centre vertical entre y=-110 (rang 0) et y=820 (mémoire) → milieu = 355
  return { s, tx: (cw - TREE_W * s) / 2, ty: ch / 2 - 355 * s };
}

let { s: vScale, tx: vTx, ty: vTy } = fitTransform();

const genLabels = Array.from(document.querySelectorAll('.gen-label'));

function updateGenLabels() {
  const h = treeOuter.clientHeight;
  genLabels.forEach(lbl => {
    const svgY = parseFloat(lbl.dataset.y);
    const screenY = vTy + svgY * vScale;
    if (screenY >= 10 && screenY <= h - 10) {
      lbl.style.top = screenY + 'px';
      lbl.classList.add('visible');
    } else {
      lbl.classList.remove('visible');
    }
  });
}

function applyVP() {
  viewport.setAttribute('transform', `translate(${vTx},${vTy}) scale(${vScale})`);
  updateGenLabels();
}
applyVP();

// ── Mouse drag
let dragging = false, dragMoved = false, dragOrig = null;
treeOuter.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  dragging = true;
  dragMoved = false;
  dragOrig = { x: e.clientX - vTx, y: e.clientY - vTy };
  treeOuter.classList.add('panning');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  const dx = e.clientX - (dragOrig.x + vTx), dy = e.clientY - (dragOrig.y + vTy);
  if(Math.abs(dx) > 4 || Math.abs(dy) > 4) dragMoved = true;
  vTx = e.clientX - dragOrig.x;
  vTy = e.clientY - dragOrig.y;
  applyVP();
});
window.addEventListener('mouseup', e => {
  const wasDrag = dragMoved;
  dragging = false; dragMoved = false;
  treeOuter.classList.remove('panning');

  // Clic simple (pas un drag) sur fond vide → effacer la mise en avant
  if(!wasDrag && activeNode) {
    const r = treeOuter.getBoundingClientRect();
    const sx = (e.clientX - r.left - vTx) / vScale;
    const sy = (e.clientY - r.top  - vTy) / vScale;
    const onNode = DATA.some(d => {
      const p = POS[d.id];
      return p && Math.hypot(sx - p.x, sy - p.y) < R_ACTIVE + 15;
    });
    if(!onNode) {
      activeNode = null;
      activeRevealIds    = new Set();
      activeVisiblePairs = new Set();
      applyState();
    }
  }
});

// ── Wheel zoom
treeOuter.addEventListener('wheel', e => {
  e.preventDefault();
  const r = treeOuter.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const ns = Math.min(MAX_S, Math.max(MIN_S, vScale * factor));
  vTx = mx - (mx - vTx) * (ns / vScale);
  vTy = my - (my - vTy) * (ns / vScale);
  vScale = ns;
  applyVP();
}, { passive: false });

// ── Touch (1 doigt = pan, 2 doigts = pinch-zoom, tap = info)
let touchBase = null, pinchBase = null;
let tapStart = null, tapMoved = false;

treeOuter.addEventListener('touchstart', e => {
  e.preventDefault();
  if(e.touches.length === 1) {
    tapMoved = false;
    tapStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
    touchBase = { cx: e.touches[0].clientX - vTx, cy: e.touches[0].clientY - vTy };
    pinchBase = null;
  } else if(e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    pinchBase = {
      dist: Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY),
      mx: (t1.clientX + t2.clientX) / 2,
      my: (t1.clientY + t2.clientY) / 2,
      tx: vTx, ty: vTy, s: vScale
    };
    touchBase = null;
  }
}, { passive: false });

treeOuter.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length === 1 && touchBase) {
    const dx = e.touches[0].clientX - tapStart.x, dy = e.touches[0].clientY - tapStart.y;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) tapMoved = true;
    vTx = e.touches[0].clientX - touchBase.cx;
    vTy = e.touches[0].clientY - touchBase.cy;
    applyVP();
  } else if(e.touches.length === 2 && pinchBase) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const mx   = (t1.clientX + t2.clientX) / 2;
    const my   = (t1.clientY + t2.clientY) / 2;
    const r    = treeOuter.getBoundingClientRect();
    const pmx  = mx - r.left, pmy = my - r.top;
    const ns   = Math.min(MAX_S, Math.max(MIN_S, pinchBase.s * (dist / pinchBase.dist)));
    vTx = pmx - (pmx - pinchBase.tx) * (ns / pinchBase.s);
    vTy = pmy - (pmy - pinchBase.ty) * (ns / pinchBase.s);
    vScale = ns;
    applyVP();
  }
}, { passive: false });

treeOuter.addEventListener('touchend', e => {
  if(!tapMoved && tapStart && (Date.now() - tapStart.t) < 280) {
    // Tap : trouver le nœud le plus proche en coordonnées SVG
    const r = treeOuter.getBoundingClientRect();
    const sx = (tapStart.x - r.left - vTx) / vScale;
    const sy = (tapStart.y - r.top  - vTy) / vScale;
    let closest = null, minD = Infinity;
    DATA.forEach(d => {
      const p = POS[d.id]; if(!p) return;
      const dist = Math.hypot(sx - p.x, sy - p.y);
      if(dist < minD) { minD = dist; closest = d; }
    });
    if(closest && minD < R_ACTIVE + 30) {
      const { ids, pairs } = computeReveal(closest.id);
      activeRevealIds = ids; activeVisiblePairs = pairs;
      applyState(); showPanel(closest);
    } else {
      activeRevealIds = new Set(); activeVisiblePairs = new Set();
      applyState();
    }
  }
  touchBase = null; pinchBase = null; tapStart = null;
});

// ── Boutons zoom
function zoomAround(factor) {
  const cw = treeOuter.clientWidth, ch = treeOuter.clientHeight;
  const mx = cw / 2, my = ch / 2;
  const ns = Math.min(MAX_S, Math.max(MIN_S, vScale * factor));
  vTx = mx - (mx - vTx) * (ns / vScale);
  vTy = my - (my - vTy) * (ns / vScale);
  vScale = ns; applyVP();
}
document.getElementById('zoomIn').addEventListener('click',    () => zoomAround(1.35));
document.getElementById('zoomOut').addEventListener('click',   () => zoomAround(1 / 1.35));
document.getElementById('zoomReset').addEventListener('click', () => {
  const f = fitTransform(); vScale = f.s; vTx = f.tx; vTy = f.ty; applyVP();
});
</script>
