<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="img/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ═══════════════════════════════════════════
       FRISE CHRONOLOGIQUE
    ═══════════════════════════════════════════ */

    body { overflow-x: hidden; }

    /* ── Header simple ── */
    .frise-header {
      text-align: center;
      padding: 1.8rem 2rem 1.2rem;
      position: relative;
      border-bottom: 1px solid rgba(212,137,154,.18);
    }
    .frise-header h1 {
      font-family: var(--font-titre, 'Cormorant Garamond', Georgia, serif);
      font-size: 2.2rem;
      font-weight: 300;
      color: #5c3a20;
    }
    .frise-header h1 em { color: #B06070; font-style: italic; }
    .frise-header p {
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #9a8a80;
      margin-top: .4rem;
    }
    .back-btn-frise {
      position: absolute;
      top: 50%; left: 1.5rem;
      transform: translateY(-50%);
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #3a2010;
      text-decoration: none;
      border: 1px solid #b09080;
      border-radius: 20px;
      padding: .35rem .85rem;
      display: flex; align-items: center; gap: .4rem;
      transition: border-color .18s, color .18s;
      white-space: nowrap;
    }
    .back-btn-frise:hover {
      border-color: #B06070;
      color: #B06070;
    }
    @media (max-width: 600px) {
      .frise-header { padding: 1.2rem 1.5rem 1rem; }
      .back-btn-frise {
        position: static;
        transform: none;
        margin: 0 auto .9rem;
        width: fit-content;
      }
    }

    /* ── Container principal ── */
    .frise-outer {
      position: relative;
      max-width: 820px;
      margin: 0 auto;
      padding: 1rem 1.5rem 8rem;
    }

    /* SVG branche — absolument positionné */
    .frise-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    /* ── Événements — grille 3 colonnes ── */
    .frise-event {
      display: grid;
      grid-template-columns: 1fr 64px 1fr;
      align-items: start;
      min-height: 100px;
      margin-bottom: 96px;
      position: relative;
    }

    /* Colonne fleur — toujours col 2 */
    .frise-flower-col {
      grid-column: 2;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    /* Label col 3 pour --right, col 1 pour --left */
    .frise-event--right .frise-label { grid-column: 3; padding-left: 28px; }
    .frise-event--left  .frise-label { grid-column: 1; padding-right: 28px; text-align: right; }

    /* Bouton fleur */
    .frise-flower {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      width: 56px; height: 56px;
      display: flex; align-items: center; justify-content: center;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), filter .22s;
      border-radius: 50%;
      position: relative;
    }
    .frise-flower::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,168,187,.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity .2s;
    }
    .frise-flower:hover { transform: scale(1.18); }
    .frise-flower:hover::after { opacity: 1; }
    .frise-flower.active {
      transform: scale(1.25);
      filter: drop-shadow(0 0 8px rgba(232,168,187,.6));
    }
    .frise-flower.active::after { opacity: 1; }

    /* Texte label */
    .frise-year {
      font-family: var(--font-titre, 'Playfair Display', serif);
      font-size: 1.4rem;
      color: #B06070;
      line-height: 1;
    }
    .frise-title-preview {
      font-size: .8rem;
      color: #7a6a60;
      margin-top: .35rem;
      letter-spacing: .05em;
    }

    /* ═══════════════════════════════════════════
       PANNEAU DE DÉTAIL
    ═══════════════════════════════════════════ */
    .event-panel {
      position: fixed;
      top: 0; right: 0;
      width: clamp(320px, 46vw, 520px);
      height: 100dvh;
      background: rgba(14, 8, 4, .97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(232,168,187,.18);
      z-index: 200;
      transform: translateX(110%);
      transition: transform .42s cubic-bezier(.25,.8,.25,1);
      overflow-y: auto;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .event-panel.open { transform: translateX(0); }

    .panel-inner {
      padding: 2rem 1.8rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      flex: 1;
    }

    .panel-topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: .5rem;
    }
    .panel-close {
      background: rgba(232,168,187,.1);
      border: 1px solid rgba(232,168,187,.25);
      color: #E8A8BB;
      border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    .panel-close:hover { background: rgba(232,168,187,.22); }

    .panel-date-badge {
      display: inline-block;
      background: rgba(232,168,187,.12);
      border: 1px solid rgba(232,168,187,.3);
      color: #E8A8BB;
      font-size: .68rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: .28rem .75rem;
      border-radius: 20px;
      width: fit-content;
    }

    .panel-title {
      font-family: var(--font-titre, 'Playfair Display', serif);
      font-size: 1.65rem;
      color: #f5ede8;
      line-height: 1.2;
      margin: 0;
    }

    .panel-subtitle {
      font-size: .82rem;
      color: rgba(232,168,187,.6);
      letter-spacing: .06em;
      margin: -.5rem 0 0;
    }

    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(232,168,187,.3) 0%, rgba(232,168,187,.08) 100%);
      margin: .2rem 0;
    }

    .panel-text {
      font-size: .88rem;
      color: rgba(245,232,222,.75);
      line-height: 1.8;
    }
    .panel-text p { margin: 0 0 .9rem; }
    .panel-text p:last-child { margin-bottom: 0; }

    .panel-img {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      max-height: 240px;
      display: block;
    }

    .panel-placeholder-note {
      font-size: .72rem;
      color: rgba(232,168,187,.35);
      letter-spacing: .06em;
      font-style: italic;
      border-top: 1px solid rgba(232,168,187,.1);
      padding-top: .8rem;
      margin-top: .5rem;
    }

    /* Scrim */
    .panel-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity .35s;
    }
    .panel-scrim.visible { opacity: 1; pointer-events: all; }

    /* ═══════════════════════════════════════════
       MOBILE
    ═══════════════════════════════════════════ */
    @media (max-width: 580px) {
      .frise-outer { padding-left: .75rem; padding-right: .75rem; }

      .frise-event {
        grid-template-columns: 1fr 44px 1fr;
        margin-bottom: 64px;
      }
      .frise-flower-col { grid-column: 2; }
      .frise-event--right .frise-label {
        grid-column: 3;
        padding-left: 10px;
        padding-right: 0;
        text-align: left;
      }
      .frise-event--left .frise-label {
        grid-column: 1;
        padding-right: 10px;
        padding-left: 0;
        text-align: right;
      }
      .frise-flower { width: 44px; height: 44px; }
      .frise-year { font-size: 1.1rem; }
      .frise-title-preview { font-size: .72rem; }

      .event-panel {
        top: auto; right: 0; bottom: 0; left: 0;
        width: 100%;
        height: 78dvh;
        border-left: none;
        border-top: 1px solid rgba(212,137,154,.2);
        border-radius: 16px 16px 0 0;
        transform: translateY(110%);
        transition: transform .42s cubic-bezier(.25,.8,.25,1);
      }
      .event-panel.open { transform: translateY(0); }
    }
  </style>
</head>

/* ═══════════════════════════════════════════════════════
   COULEURS PÉTALES
═══════════════════════════════════════════════════════ */
const PINKS = [
  ['#F5C6D2','#EAB8C8'],
  ['#F2D0DC','#E8A8BB'],
  ['#FBDDE6','#F5C6D2'],
  ['#E8A8BB','#F2D0DC'],
  ['#EAB8C8','#FBDDE6'],
];

/* ═══════════════════════════════════════════════════════
   GÉNÉRATION SVG FLEUR SAKURA
═══════════════════════════════════════════════════════ */
function makePetal(angle, s, c1, c2) {
  const a = angle;
  const cos = Math.cos(a), sin = Math.sin(a);
  // Pétale : courbe de Bézier symétrique autour de l'axe angle
  const tipX = (cos * s * 0.85).toFixed(2);
  const tipY = (sin * s * 0.85).toFixed(2);
  const cl1x = (cos * s * 0.35 - sin * s * 0.32).toFixed(2);
  const cl1y = (sin * s * 0.35 + cos * s * 0.32).toFixed(2);
  const cl2x = (cos * s * 0.72 - sin * s * 0.30).toFixed(2);
  const cl2y = (sin * s * 0.72 + cos * s * 0.30).toFixed(2);
  const cr1x = (cos * s * 0.35 + sin * s * 0.32).toFixed(2);
  const cr1y = (sin * s * 0.35 - cos * s * 0.32).toFixed(2);
  const cr2x = (cos * s * 0.72 + sin * s * 0.30).toFixed(2);
  const cr2y = (sin * s * 0.72 - cos * s * 0.30).toFixed(2);
  return `<path d="M 0 0 C ${cl1x} ${cl1y} ${cl2x} ${cl2y} ${tipX} ${tipY} C ${cr2x} ${cr2y} ${cr1x} ${cr1y} 0 0 Z" fill="${c1}" opacity="0.9"/>`;
}

function flowerSVG(size, colors) {
  const s = size * 0.46;
  const [c1, c2] = colors;
  let petals = '';
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
    petals += makePetal(angle, s, i % 2 === 0 ? c1 : c2, c2);
  }
  // Encoche au bout de chaque pétale
  let notches = '';
  for (let i = 0; i < 5; i++) {
    const angle = (Math.PI * 2 * i / 5) - Math.PI / 2;
    const tx = Math.cos(angle) * s * 0.84;
    const ty = Math.sin(angle) * s * 0.84;
    notches += `<circle cx="${tx.toFixed(2)}" cy="${ty.toFixed(2)}" r="${(s*0.09).toFixed(2)}" fill="rgba(14,8,4,.35)"/>`;
  }
  // Étamines
  let stamens = '';
  for (let i = 0; i < 8; i++) {
    const a = Math.PI * 2 * i / 8;
    const r = s * 0.36;
    stamens += `<circle cx="${(Math.cos(a)*r).toFixed(2)}" cy="${(Math.sin(a)*r).toFixed(2)}" r="${(s*0.048).toFixed(2)}" fill="rgba(230,195,80,.75)"/>`;
  }
  const vb = size / 2;
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${-vb} ${-vb} ${size} ${size}" width="${size}" height="${size}">
    <g>${petals}${notches}</g>
    <circle cx="0" cy="0" r="${(s*0.24).toFixed(2)}" fill="#fff8d7" opacity="0.95"/>
    ${stamens}
  </svg>`;
}

/* ═══════════════════════════════════════════════════════
   RENDU DES ÉVÉNEMENTS
═══════════════════════════════════════════════════════ */
function renderEvents() {
  const container = document.getElementById('friseEvents');
  EVENTS.forEach((ev, i) => {
    const side = i % 2 === 0 ? 'right' : 'left';
    const colors = PINKS[i % PINKS.length];

    const div = document.createElement('div');
    div.className = `frise-event frise-event--${side}`;

    // Colonne fleur (centre)
    const flowerCol = document.createElement('div');
    flowerCol.className = 'frise-flower-col';
    const btn = document.createElement('button');
    btn.className = 'frise-flower';
    btn.dataset.idx = i;
    btn.setAttribute('aria-label', `${ev.date} — ${ev.title}`);
    btn.innerHTML = flowerSVG(52, colors);
    flowerCol.appendChild(btn);

    // Colonne label
    const label = document.createElement('div');
    label.className = 'frise-label';
    label.innerHTML = `<div class="frise-year">${ev.date}</div>
      <div class="frise-title-preview">${ev.title}</div>`;

    if (side === 'right') {
      div.appendChild(document.createElement('div')); // colonne gauche vide
      div.appendChild(flowerCol);
      div.appendChild(label);
    } else {
      div.appendChild(label);
      div.appendChild(flowerCol);
      div.appendChild(document.createElement('div')); // colonne droite vide
    }

    container.appendChild(div);
  });
}

/* ═══════════════════════════════════════════════════════
   DESSIN SVG BRANCHE
═══════════════════════════════════════════════════════ */
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function drawBranch() {
  const svg = document.getElementById('friseSvg');
  svg.innerHTML = '';

  const outer = document.getElementById('friseOuter');
  const outerRect = outer.getBoundingClientRect();
  const W = outer.offsetWidth;
  const H = outer.offsetHeight;

  // Defs : gradient tronc
  const defs = svgEl('defs', {});
  const grad = svgEl('linearGradient', { id: 'trunkGrad', x1: '0', y1: '0', x2: '0', y2: '1', gradientUnits: 'objectBoundingBox' });
  [['0%','#8a6035','0.2'],['15%','#7a5028','0.85'],['60%','#5c3a18','0.75'],['100%','#3a2208','0.4']].forEach(([off,col,op]) => {
    const s = svgEl('stop', { offset: off, 'stop-color': col, 'stop-opacity': op });
    grad.appendChild(s);
  });
  defs.appendChild(grad);
  svg.appendChild(defs);

  // Positions des fleurs
  const flowers = Array.from(document.querySelectorAll('.frise-flower'));
  if (!flowers.length) return;

  const positions = flowers.map(f => {
    const r = f.getBoundingClientRect();
    return {
      x: r.left + r.width / 2 - outerRect.left,
      y: r.top + r.height / 2 - outerRect.top,
      side: f.closest('.frise-event').classList.contains('frise-event--right') ? 'right' : 'left',
    };
  });

  const cx = W / 2;
  const startY = positions[0].y - 70;
  const endY   = positions[positions.length - 1].y + 90;

  // ── Tronc sinueux ──
  let trunkD = `M ${cx.toFixed(1)} ${startY.toFixed(1)}`;
  positions.forEach((p, i) => {
    const prevY = i === 0 ? startY : positions[i - 1].y;
    const midY  = (prevY + p.y) / 2;
    const wave  = (i % 2 === 0 ? 6 : -6);
    trunkD += ` C ${(cx + wave).toFixed(1)} ${(prevY + (p.y-prevY)*0.35).toFixed(1)} ${(cx - wave).toFixed(1)} ${(midY).toFixed(1)} ${cx.toFixed(1)} ${p.y.toFixed(1)}`;
  });
  trunkD += ` L ${cx.toFixed(1)} ${endY.toFixed(1)}`;

  svg.appendChild(svgEl('path', {
    d: trunkD,
    stroke: 'url(#trunkGrad)',
    'stroke-width': '2.8',
    fill: 'none',
    'stroke-linecap': 'round',
    'stroke-linejoin': 'round',
  }));

  // ── Branches vers les fleurs ──
  positions.forEach((p, i) => {
    const offX = p.side === 'right' ? 1 : -1;
    const cp1x = cx + offX * 18;
    const cp1y = p.y - 18;
    const cp2x = p.x - offX * 14;
    const cp2y = p.y - 10;

    svg.appendChild(svgEl('path', {
      d: `M ${cx.toFixed(1)} ${p.y.toFixed(1)} C ${cp1x.toFixed(1)} ${cp1y.toFixed(1)} ${cp2x.toFixed(1)} ${cp2y.toFixed(1)} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`,
      stroke: '#6b4422',
      'stroke-width': '1.6',
      fill: 'none',
      'stroke-linecap': 'round',
      opacity: '0.72',
    }));

    // Petite branchette décorative côté opposé
    const tw = p.side === 'right' ? -1 : 1;
    const twLen = 22 + (i * 7) % 14;
    const twEndX = cx + tw * twLen * 0.65;
    const twEndY = p.y - twLen;
    svg.appendChild(svgEl('path', {
      d: `M ${cx.toFixed(1)} ${(p.y - 4).toFixed(1)} Q ${(cx + tw * 12).toFixed(1)} ${((p.y + twEndY)/2 - 5).toFixed(1)} ${twEndX.toFixed(1)} ${twEndY.toFixed(1)}`,
      stroke: '#5a3515',
      'stroke-width': '1',
      fill: 'none',
      'stroke-linecap': 'round',
      opacity: '0.4',
    }));
  });

  // ── Pétales tombants décoratifs ──
  const petalColors = ['#F5C6D2','#E8A8BB','#F2D0DC','#FBDDE6','#EAB8C8'];
  const rng = (seed, min, max) => min + ((seed * 9301 + 49297) % 233280) / 233280 * (max - min);
  for (let i = 0; i < 16; i++) {
    const px = cx + rng(i*3+1, -W*0.38, W*0.38);
    const py = startY + rng(i*3+2, 0, endY - startY);
    const rx = rng(i*3+3, 3.5, 6.5);
    const ry = rx * rng(i*3, 0.45, 0.7);
    const angle = rng(i*7, 0, 360);
    const color = petalColors[i % petalColors.length];
    const op    = (0.1 + rng(i*11, 0, 0.18)).toFixed(2);
    svg.appendChild(svgEl('ellipse', {
      cx: px.toFixed(1), cy: py.toFixed(1),
      rx: rx.toFixed(1), ry: ry.toFixed(1),
      fill: color, opacity: op,
      transform: `rotate(${angle.toFixed(0)} ${px.toFixed(1)} ${py.toFixed(1)})`,
    }));
  }
}

/* ═══════════════════════════════════════════════════════
   PANNEAU — OPEN / CLOSE
═══════════════════════════════════════════════════════ */
let activeIdx = -1;

function openPanel(idx) {
  const ev = EVENTS[idx];
  const panel = document.getElementById('eventPanel');
  const scrim  = document.getElementById('panelScrim');

  document.getElementById('panelDate').textContent     = ev.date;
  document.getElementById('panelTitle').textContent    = ev.title;
  document.getElementById('panelSubtitle').textContent = ev.subtitle;
  document.getElementById('panelText').innerHTML = ev.text
    .split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');

  // Image
  const imgWrap = document.getElementById('panelImgWrap');
  imgWrap.innerHTML = '';
  if (ev.image) {
    const img = document.createElement('img');
    img.src = ev.image; img.alt = ev.title; img.className = 'panel-img';
    imgWrap.appendChild(img);
  }

  // Note placeholder
  document.getElementById('panelNote').style.display = ev.placeholder ? 'block' : 'none';

  // Active flower
  document.querySelectorAll('.frise-flower').forEach((f, i) => {
    f.classList.toggle('active', i === idx);
  });

  activeIdx = idx;
  panel.classList.add('open');
  scrim.classList.add('visible');
  panel.scrollTop = 0;
}

function closePanel() {
  document.getElementById('eventPanel').classList.remove('open');
  document.getElementById('panelScrim').classList.remove('visible');
  document.querySelectorAll('.frise-flower').forEach(f => f.classList.remove('active'));
  activeIdx = -1;
}

document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelScrim').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// Délégation — clic sur une fleur
document.getElementById('friseEvents').addEventListener('click', e => {
  const btn = e.target.closest('.frise-flower');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx, 10);
  if (activeIdx === idx) { closePanel(); return; }
  openPanel(idx);
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
renderEvents();
// drawBranch après paint pour avoir les positions DOM correctes
requestAnimationFrame(() => requestAnimationFrame(drawBranch));
window.addEventListener('resize', drawBranch);
</script>
